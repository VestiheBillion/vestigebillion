<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>தயாரிப்பு டெமோ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f3f3f3;
      padding-top: 60px;
    }

    .video-container {
      max-width: 90%;
      margin: 0 auto;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background-color: black;
    }

    iframe {
      width: 100%;
      height: 300px;
    }

    .btn-wrap {
      display: flex;
      justify-content: center;
      margin-top: 40px;
      margin-bottom: 100px;
    }

    .btn-watch {
      background-color: #000;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      transition: 0.3s ease;
    }

    .btn-watch:hover {
      background-color: #222;
    }

    .bottom-island {
      background-color: white;
      border-radius: 80px;
      padding: 12px 30px;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .bottom-island .btn {
      background-color: #671BFF;
      color: white;
      border-radius: 20px;
      padding: 6px 18px;
    }
  </style>
</head>
<body>

  <div class="container text-center">
    <h2 class="mb-4">தயாரிப்பு டெமோ</h2>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/W1Fe3VXB2AA?autoplay=1&mute=0&controls=0&rel=0&modestbranding=1" 
              title="தயாரிப்பு டெமோ வீடியோ"
              frameborder="0"
              allow="autoplay; encrypted-media"
              allowfullscreen>
      </iframe>
    </div>

    <div class="btn-wrap">
      <a href="training_tamil.html" class="btn-watch">முந்தைய பயிற்சி வீடியோ</a>
    </div>
  </div>

  <div class="bottom-island">
    <a href="index_tamil.html" title="முகப்பு"><i class="bi bi-house fs-4"></i></a>
    <a href="upload_tamil.html" class="btn">ஆர்வமுள்ளவை</a>
    <a href="index.html" title="Translate"><i class="bi bi-translate fs-4"></i></a>
  </div>

</body>
</html>
